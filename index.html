<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Configurações para Web App (PWA) no telemóvel -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f8fafc">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>EstradaLivre - App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --app-bg: #f8fafc; /* slate-50 */
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: var(--app-bg);
            color: #0f172a; /* slate-900 */
        }

        /* Ocultar barra de rolagem mas manter funcionalidade */
        ::-webkit-scrollbar { display: none; }
        
        /* Efeito de Vidro (Glassmorphism) para o menu inferior */
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Estilo App para Inputs */
        .app-input {
            width: 100%;
            padding: 1rem 1.25rem;
            background-color: #f1f5f9; /* slate-100 */
            border: 2px solid transparent;
            border-radius: 1rem;
            font-size: 1.125rem;
            font-weight: 600;
            color: #1e293b;
            outline: none;
            transition: all 0.2s ease;
        }
        .app-input:focus {
            background-color: #ffffff;
            border-color: #f97316; /* orange-500 */
            box-shadow: 0 4px 14px rgba(249, 115, 22, 0.1);
        }
        .app-input::placeholder { font-weight: 500; color: #94a3b8; }

        /* Botão Primário Moderno */
        .app-btn {
            width: 100%;
            padding: 1.25rem;
            border-radius: 1rem;
            font-weight: 800;
            font-size: 1.125rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .app-btn:active { transform: scale(0.96); }
        .btn-orange { background: linear-gradient(135deg, #f97316, #ea580c); box-shadow: 0 8px 20px rgba(249, 115, 22, 0.3); }
        .btn-green { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }
        .btn-dark { background: linear-gradient(135deg, #1e293b, #0f172a); box-shadow: 0 8px 20px rgba(30, 41, 59, 0.3); }

        /* Animação de entrada das abas */
        .section-enter {
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ajustes do Menu Inferior */
        @media (max-width: 768px) {
            main { padding-bottom: 100px; padding-top: 20px; }
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #94a3b8; /* slate-400 */
            transition: all 0.2s ease;
            position: relative;
        }
        .nav-active {
            color: #f97316 !important; /* orange-500 */
        }
        .nav-active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: #f97316;
        }
        
        /* Ocultar barra lateral desktop para focar 100% no visual mobile/tablet */
        @media (min-width: 769px) {
            body { justify-content: center; align-items: center; background-color: #e2e8f0; }
            .app-container {
                width: 414px; /* iPhone Max width */
                height: 896px;
                background-color: var(--app-bg);
                border-radius: 40px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
                overflow: hidden;
                position: relative;
            }
            main { height: calc(100% - 80px); }
            aside { position: absolute !important; bottom: 0; width: 100%; }
        }
    </style>
</head>
<body class="min-h-screen flex">

    <div class="app-container w-full h-full min-h-screen flex flex-col relative">
        
        <!-- Conteúdo Principal -->
        <main class="flex-1 overflow-y-auto px-5 pb-28 pt-6">
            
            <!-- Dashboard Section -->
            <section id="section-dashboard" class="space-y-6 section-enter">
                <header class="flex justify-between items-center mb-6">
                    <div>
                        <p class="text-sm font-semibold text-slate-400">Visão Geral</p>
                        <h1 class="text-2xl font-black text-slate-800">Minha Viagem</h1>
                    </div>
                    <div class="bg-orange-100 p-3 rounded-full text-orange-500">
                        <i data-lucide="truck" class="w-6 h-6"></i>
                    </div>
                </header>

                <!-- Card de Saldo Principal -->
                <div class="bg-gradient-to-br from-slate-900 to-slate-800 rounded-[2rem] p-6 shadow-2xl text-white relative overflow-hidden">
                    <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/5 rounded-full blur-2xl"></div>
                    <p class="text-slate-300 font-medium text-sm uppercase tracking-wider mb-1">Lucro Líquido</p>
                    <h2 class="text-4xl font-black mb-6" id="dash-saldo-liquido">R$ 0,00</h2>
                    
                    <div class="flex justify-between items-center pt-4 border-t border-slate-700/50">
                        <div>
                            <p class="text-xs text-slate-400 font-medium mb-1"><i data-lucide="arrow-down-right" class="inline w-3 h-3 text-green-400"></i> ENTRADAS</p>
                            <p class="font-bold text-green-400" id="dash-total-frete">R$ 0,00</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-slate-400 font-medium mb-1"><i data-lucide="arrow-up-right" class="inline w-3 h-3 text-red-400"></i> SAÍDAS</p>
                            <p class="font-bold text-red-400" id="dash-total-gastos">R$ 0,00</p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-6">
                    <!-- Widget Pedágio -->
                    <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 flex flex-col justify-center items-center text-center">
                        <div class="bg-blue-50 text-blue-500 p-3 rounded-2xl mb-3">
                            <i data-lucide="map-pin" class="w-6 h-6"></i>
                        </div>
                        <h3 class="text-lg font-black text-slate-800" id="dash-total-pedagio-sozinho">R$ 0,00</h3>
                        <p class="text-xs font-semibold text-slate-400 uppercase mt-1">Pedágios</p>
                        <span class="text-[10px] font-bold text-blue-500 bg-blue-50 px-2 py-1 rounded-full mt-2" id="dash-count-pedagio">0 Passagens</span>
                    </div>

                    <!-- Resumo Categorias -->
                    <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
                        <h3 class="text-xs font-bold text-slate-400 uppercase mb-3 flex items-center gap-1">
                            <i data-lucide="pie-chart" class="w-3 h-3"></i> Top Gastos
                        </h3>
                        <div class="space-y-3" id="dash-resumo-categorias">
                            <!-- JS -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- ABA PEDÁGIOS -->
            <section id="section-pedagios" class="hidden space-y-6">
                <header class="mb-6">
                    <p class="text-sm font-semibold text-slate-400">Novo Registro</p>
                    <h1 class="text-3xl font-black text-slate-800">Pedágio</h1>
                </header>
                
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2 pl-2">Local da Praça</label>
                        <input type="text" id="ped-desc" placeholder="Ex: BR-116 Km 200" class="app-input">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-2 pl-2">Eixos</label>
                            <select id="ped-eixos" class="app-input appearance-none">
                                <option value="2">2 Eixos</option>
                                <option value="3">3 Eixos</option>
                                <option value="4">4 Eixos</option>
                                <option value="5">5 Eixos</option>
                                <option value="6">6 Eixos</option>
                                <option value="7">7 Eixos</option>
                                <option value="9">9 Eixos</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-2 pl-2">Valor (R$)</label>
                            <input type="number" id="ped-valor" step="0.01" placeholder="0,00" class="app-input">
                        </div>
                    </div>
                    <div class="pt-4">
                        <button onclick="adicionarPedagio()" class="app-btn btn-dark">
                            <i data-lucide="check-circle" class="w-5 h-5"></i> SALVAR PASSAGEM
                        </button>
                    </div>
                </div>
            </section>

            <!-- ABA GASTOS -->
            <section id="section-gastos" class="hidden space-y-6">
                <header class="mb-6">
                    <p class="text-sm font-semibold text-slate-400">Novo Registro</p>
                    <h1 class="text-3xl font-black text-slate-800">Despesa</h1>
                </header>

                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2 pl-2">Descrição</label>
                        <input type="text" id="gasto-desc" placeholder="Ex: Diesel Posto Ipiranga" class="app-input">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2 pl-2">Categoria</label>
                        <select id="gasto-categoria" class="app-input appearance-none">
                            <option value="Diesel">Diesel</option>
                            <option value="Alimentação">Alimentação</option>
                            <option value="Manutenção">Manutenção</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2 pl-2">Valor (R$)</label>
                        <input type="number" id="gasto-valor" step="0.01" placeholder="0,00" class="app-input">
                    </div>
                    <div class="pt-4">
                        <button onclick="adicionarGasto()" class="app-btn btn-orange">
                            REGISTRAR GASTO
                        </button>
                    </div>
                </div>
            </section>

            <!-- ABA FRETES -->
            <section id="section-fretes" class="hidden space-y-6">
                <header class="mb-6">
                    <p class="text-sm font-semibold text-slate-400">Nova Entrada</p>
                    <h1 class="text-3xl font-black text-slate-800">Frete</h1>
                </header>

                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2 pl-2">Rota / Cliente</label>
                        <input type="text" id="frete-desc" placeholder="Ex: SP -> RJ (Soja)" class="app-input">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2 pl-2">Valor Bruto (R$)</label>
                        <input type="number" id="frete-valor" step="0.01" placeholder="0,00" class="app-input text-green-600">
                    </div>
                    <div class="pt-4">
                        <button onclick="adicionarFrete()" class="app-btn btn-green">
                            REGISTRAR FRETE
                        </button>
                    </div>
                </div>
            </section>

            <!-- ABA LISTA/RELATORIO -->
            <section id="section-relatorio" class="hidden space-y-6">
                <header class="mb-4 flex justify-between items-center">
                    <div>
                        <p class="text-sm font-semibold text-slate-400">Histórico Completo</p>
                        <h1 class="text-3xl font-black text-slate-800">Movimentações</h1>
                    </div>
                </header>

                <div id="lista-movimentacoes-mobile" class="space-y-3 pb-4">
                    <!-- JS gera cards aqui -->
                </div>
            </section>

        </main>

        <!-- Menu Inferior Mobile (Glassmorphism) -->
        <aside class="fixed md:absolute bottom-0 left-0 w-full glass-nav px-6 py-4 pb-safe rounded-t-[2rem] z-50">
            <nav class="flex justify-between items-center">
                <button onclick="showSection('dashboard')" id="btn-dashboard" class="nav-item nav-active">
                    <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
                    <span class="text-[10px] font-bold">Início</span>
                </button>
                <button onclick="showSection('pedagios')" id="btn-pedagios" class="nav-item">
                    <i data-lucide="map-pin" class="w-6 h-6"></i>
                    <span class="text-[10px] font-bold">Pedágio</span>
                </button>
                
                <!-- Botão Central Flutuante para Gastos -->
                <button onclick="showSection('gastos')" id="btn-gastos" class="relative -top-6 bg-gradient-to-tr from-orange-500 to-orange-400 text-white p-4 rounded-full shadow-lg shadow-orange-500/40 transform transition hover:scale-105 active:scale-95">
                    <i data-lucide="plus" class="w-7 h-7"></i>
                </button>

                <button onclick="showSection('fretes')" id="btn-fretes" class="nav-item">
                    <i data-lucide="trending-up" class="w-6 h-6"></i>
                    <span class="text-[10px] font-bold">Fretes</span>
                </button>
                <button onclick="showSection('relatorio')" id="btn-relatorio" class="nav-item">
                    <i data-lucide="list" class="w-6 h-6"></i>
                    <span class="text-[10px] font-bold">Histórico</span>
                </button>
            </nav>
        </aside>
    </div>

    <script>
        // 1. Carregar dados do LocalStorage ou iniciar array vazio
        let movimentacoes = JSON.parse(localStorage.getItem('estradaLivreAppDados')) || [];

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            atualizarInterface();
        });

        // 2. Função para salvar automaticamente no LocalStorage
        function salvarDados() {
            localStorage.setItem('estradaLivreAppDados', JSON.stringify(movimentacoes));
        }

        function showSection(sectionId) {
            // Esconder todas as seções e remover classe de animação
            document.querySelectorAll('main > section').forEach(s => {
                s.classList.add('hidden');
                s.classList.remove('section-enter');
            });
            
            // Mostrar a seção alvo e adicionar animação
            const target = document.getElementById(`section-${sectionId}`);
            target.classList.remove('hidden');
            // Força o reflow para a animação rodar de novo
            void target.offsetWidth; 
            target.classList.add('section-enter');
            
            // Atualizar navegação
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('nav-active'));
            const activeBtn = document.getElementById(`btn-${sectionId}`);
            if (activeBtn && sectionId !== 'gastos') { // O botão central não usa a classe nav-active
                activeBtn.classList.add('nav-active');
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function adicionarPedagio() {
            const desc = document.getElementById('ped-desc').value;
            const eixos = document.getElementById('ped-eixos').value;
            const valor = parseFloat(document.getElementById('ped-valor').value);

            if (!desc || isNaN(valor)) return showToast("Preencha todos os campos corretamente.");

            movimentacoes.push({
                id: Date.now(),
                data: new Date().toLocaleDateString('pt-BR'),
                tipo: 'gasto',
                categoria: 'Pedágio',
                desc: `${desc} (${eixos} ex)`,
                valor: valor
            });

            salvarDados(); // Salva no cookie/localStorage
            limparCamposPedagio();
            atualizarInterface();
            showToast("Pedágio salvo com sucesso!");
            setTimeout(() => showSection('dashboard'), 800);
        }

        function adicionarGasto() {
            const desc = document.getElementById('gasto-desc').value;
            const cat = document.getElementById('gasto-categoria').value;
            const valor = parseFloat(document.getElementById('gasto-valor').value);

            if (!desc || isNaN(valor)) return showToast("Preencha todos os campos corretamente.");

            movimentacoes.push({ id: Date.now(), data: new Date().toLocaleDateString('pt-BR'), tipo: 'gasto', categoria: cat, desc, valor });
            
            salvarDados(); // Salva no cookie/localStorage
            limparCamposGasto();
            atualizarInterface();
            showToast("Gasto salvo com sucesso!");
            setTimeout(() => showSection('dashboard'), 800);
        }

        function adicionarFrete() {
            const desc = document.getElementById('frete-desc').value;
            const valor = parseFloat(document.getElementById('frete-valor').value);

            if (!desc || isNaN(valor)) return showToast("Preencha todos os campos corretamente.");

            movimentacoes.push({ id: Date.now(), data: new Date().toLocaleDateString('pt-BR'), tipo: 'frete', categoria: 'Frete', desc, valor });
            
            salvarDados(); // Salva no cookie/localStorage
            limparCamposFrete();
            atualizarInterface();
            showToast("Frete salvo com sucesso!");
            setTimeout(() => showSection('dashboard'), 800);
        }

        function deletar(id) {
            movimentacoes = movimentacoes.filter(m => m.id !== id);
            salvarDados(); // Salva a remoção no cookie/localStorage
            atualizarInterface();
            showToast("Registro excluído.");
        }

        function atualizarInterface() {
            const totalFrete = movimentacoes.filter(m => m.tipo === 'frete').reduce((s, m) => s + m.valor, 0);
            const totalGastos = movimentacoes.filter(m => m.tipo === 'gasto').reduce((s, m) => s + m.valor, 0);
            const totalPedagio = movimentacoes.filter(m => m.categoria === 'Pedágio').reduce((s, m) => s + m.valor, 0);
            const saldo = totalFrete - totalGastos;

            document.getElementById('dash-total-frete').innerText = formatarMoeda(totalFrete);
            document.getElementById('dash-total-gastos').innerText = formatarMoeda(totalGastos);
            document.getElementById('dash-total-pedagio-sozinho').innerText = formatarMoeda(totalPedagio);
            document.getElementById('dash-count-pedagio').innerText = `${movimentacoes.filter(m => m.categoria === 'Pedágio').length} Passagens`;
            
            const saldoElem = document.getElementById('dash-saldo-liquido');
            saldoElem.innerText = formatarMoeda(saldo);
            // Muda a cor do saldo no dashboard se ficar negativo
            if (saldo < 0) {
                saldoElem.classList.remove('text-white');
                saldoElem.classList.add('text-red-400');
            } else {
                saldoElem.classList.add('text-white');
                saldoElem.classList.remove('text-red-400');
            }

            // Resumo Categorias (Top 3)
            const cats = {};
            movimentacoes.filter(m => m.tipo === 'gasto' && m.categoria !== 'Pedágio').forEach(m => cats[m.categoria] = (cats[m.categoria] || 0) + m.valor);
            
            const resumoHtml = Object.entries(cats)
                .sort((a, b) => b[1] - a[1]) // Ordena do maior para menor
                .slice(0, 3) // Pega os 3 maiores
                .map(([c, v]) => `
                <div class="flex justify-between items-center bg-slate-50 p-2 rounded-xl">
                    <span class="text-xs font-bold text-slate-600">${c}</span>
                    <span class="text-xs font-black text-slate-800">${formatarMoeda(v)}</span>
                </div>
            `).join('');
            
            document.getElementById('dash-resumo-categorias').innerHTML = resumoHtml || '<div class="text-xs text-center text-slate-400 py-4 font-medium">Nenhum outro gasto</div>';

            // Cards do Histórico
            const sorted = movimentacoes.slice().reverse();
            document.getElementById('lista-movimentacoes-mobile').innerHTML = sorted.map(m => `
                <div class="bg-white p-5 rounded-[1.5rem] shadow-sm border border-slate-100 flex justify-between items-center group relative overflow-hidden">
                    <!-- Faixa colorida lateral -->
                    <div class="absolute left-0 top-0 bottom-0 w-1.5 ${m.tipo === 'frete' ? 'bg-green-500' : m.categoria === 'Pedágio' ? 'bg-blue-500' : 'bg-orange-500'}"></div>
                    
                    <div class="space-y-1 pl-2">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-black uppercase tracking-wider text-slate-400">${m.categoria}</span>
                            <span class="w-1 h-1 rounded-full bg-slate-200"></span>
                            <span class="text-[10px] font-bold text-slate-400">${m.data}</span>
                        </div>
                        <p class="text-sm font-bold text-slate-800">${m.desc}</p>
                    </div>
                    
                    <div class="flex flex-col items-end gap-1">
                        <span class="font-black ${m.tipo === 'frete' ? 'text-green-500' : 'text-slate-800'}">
                            ${m.tipo === 'frete' ? '+' : '-'}${formatarMoeda(m.valor)}
                        </span>
                        <button onclick="deletar(${m.id})" class="text-slate-300 hover:text-red-500 transition-colors p-1 bg-slate-50 rounded-full active:scale-90">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `).join('') || `
                <div class="text-center py-16 bg-white rounded-[2rem] border border-slate-100 border-dashed">
                    <div class="bg-slate-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i data-lucide="inbox" class="w-8 h-8 text-slate-300"></i>
                    </div>
                    <p class="text-slate-400 font-medium">Nenhuma movimentação</p>
                </div>
            `;

            lucide.createIcons();
        }

        function formatarMoeda(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
        
        function showToast(m) {
            // Remove toast existente se houver
            const existingToast = document.getElementById('app-toast');
            if (existingToast) existingToast.remove();

            const t = document.createElement('div');
            t.id = 'app-toast';
            t.className = 'fixed top-6 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur-md text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl z-[100] transition-all transform duration-300 flex items-center gap-2';
            t.innerHTML = `<i data-lucide="info" class="w-4 h-4 text-orange-400"></i> ${m}`;
            
            // Estado inicial escondido
            t.style.opacity = '0';
            t.style.transform = 'translate(-50%, -20px)';
            
            document.body.appendChild(t);
            lucide.createIcons();
            
            // Animação de entrada
            requestAnimationFrame(() => {
                t.style.opacity = '1';
                t.style.transform = 'translate(-50%, 0)';
            });

            // Remover após 3s
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transform = 'translate(-50%, -20px)';
                setTimeout(() => t.remove(), 300);
            }, 3000);
        }

        function limparCamposPedagio() { document.getElementById('ped-desc').value = ''; document.getElementById('ped-valor').value = ''; }
